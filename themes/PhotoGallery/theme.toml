# theme.toml template for a Hugo theme
# See https://github.com/gohugoio/hugoThemes#themetoml for an example

name = "PhotoGallery"
license = "MIT"
licenselink = "https://github.com/yourusername/hugo-PhotoGallery/blob/main/LICENSE"
description = "A clean, modern Hugo photo gallery theme inspired by Instagram"
homepage = "https://github.com/yourusername/hugo-PhotoGallery"
demosite = "https://yourusername.github.io/hugo-PhotoGallery/"
tags = [
  "responsive",
  "gallery",
  "photos",
  "instagram",
  "clean",
  "modern",
  "light",
  "dark",
  "minimalist",
  "photography"
]
features = [
  "responsive",
  "gallery",
  "photo-grid",
  "light-dark-mode",
  "theme-toggle",
  "multilingual",
  "image-optimization",
  "lazy-loading",
  "social-sharing",
  "image-metadata"
]
min_version = "0.112.0"

[author]
  name = "Your Name"
  homepage = "https://github.com/yourusername"

# If porting an existing theme
[original]
  name = "PaperMod"
  author = "Aditya Telange"
  homepage = "https://github.com/adityatelange"
  repo = "https://github.com/adityatelange/hugo-PaperMod"
