baseURL = 'https://example.com'
languageCode = 'zh-CN'
title = 'PhotoGallery Demo'
theme = 'PhotoGallery'

[params]
    author = 'Demo User'
    description = 'A demo site for PhotoGallery theme'
    defaultTheme = 'auto'
    disableThemeToggle = false
    
    [params.footer]
        hideCopyright = false

[menu]
    [[menu.main]]
        identifier = 'home'
        name = '首页'
        url = '/'
        weight = 10
    [[menu.main]]
        identifier = 'about'
        name = '关于'
        url = '/about/'
        weight = 20

[pagination]
    pagerSize = 12

[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true
